spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:sellerinsight;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: never

logging:
  level:
    root: WARN
    com.sellerinsight: INFO